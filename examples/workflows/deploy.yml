# TEMPLATE — copy this into YOUR application repository as
# .github/workflows/deploy.yml
#
# This is not an active workflow in the pinqops product repo (pinqops has no
# container app to deploy). It shows how a consuming application uses pinqops:
# GitHub builds the app image in the cloud and pushes it to GHCR, then a
# self-hosted runner on your closed server runs `pinqops deploy`.
#
# Requirements in the consuming repo:
#   - A Dockerfile at the repository root (your application image).
#   - A self-hosted runner labelled `pinqops-prod`, installed with
#     `pinqops install-runner` (see docs/SETUP.md).
#   - The pinqops CLI on the runner's PATH, and the fixed app compose project on
#     the server (default /opt/pinqops/docker-compose.yml).

name: Build and Deploy

# Deployment runs ONLY when a commit lands on master. Because the repository
# uses branch protection, the only way a commit reaches master is by merging a
# reviewed pull request. Opening a PR or pushing to any other branch does NOT
# trigger this workflow.
on:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: deploy-master
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1) Build in the cloud (GitHub-hosted runner) and push :latest to GHCR.
  #    The production server never builds and never receives the source code.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Each build is pushed twice: :latest for convenience and an immutable
      # :sha-<commit> tag. The deploy pins the SHA tag in the server's .env so
      # the exact deployed version is recorded and `pinqops rollback` can
      # return to any recent one.
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 2) Deploy on the self-hosted runner that lives on the production server.
  #    The runner dials GitHub outbound, so the server exposes NO inbound port.
  #    It invokes the pinqops CLI (installed on the server) — see docs/SETUP.md.
  # ---------------------------------------------------------------------------
  deploy:
    needs: build
    runs-on: [self-hosted, pinqops-prod]
    permissions:
      contents: read
      packages: read
    env:
      # Path to the single, fixed application compose project on the server.
      # Override by setting a repository variable APP_COMPOSE_PATH if needed.
      APP_COMPOSE_PATH: ${{ vars.APP_COMPOSE_PATH || '/opt/pinqops/docker-compose.yml' }}
    steps:
      - name: Deploy with pinqops
        run: |
          set -euo pipefail

          # Authenticate to GHCR using the per-job, short-lived GITHUB_TOKEN.
          # No long-lived registry secret is stored on the server.
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          # pinqops pins PINQOPS_TAG in the project's .env, runs the fixed
          # compose pull + up -d, health-checks the services and records the
          # deploy in history. No repository content is checked out or executed
          # on the server. (Requires the compose file to reference the image as
          # `image: ...:${PINQOPS_TAG:-latest}` — see deploy/app.docker-compose.example.yml.)
          pinqops deploy --compose-file "$APP_COMPOSE_PATH" --tag "sha-${{ github.sha }}"

      - name: Log out of GHCR
        if: always()
        run: docker logout ghcr.io || true
