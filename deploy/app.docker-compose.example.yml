# Example of the SINGLE, FIXED application compose project that lives on the
# production server (for example at /opt/pinqops/docker-compose.yml).
#
# The deploy job on the self-hosted runner runs, verbatim, via the pinqops CLI:
#   pinqops deploy --compose-file /opt/pinqops/docker-compose.yml
# which performs:
#   docker compose -f /opt/pinqops/docker-compose.yml pull
#   docker compose -f /opt/pinqops/docker-compose.yml up -d
#
# Copy this to the server, replace the image reference, and add whatever your
# application itself needs (volumes, env). The dashboard generates this file for
# you — this copy is for doing it by hand.
#
# The project name prefixes every container compose creates, so naming it after
# your repository makes `docker ps` read <repo>-app-1 instead of something generic.
# Quoted so an all-digit name (e.g. "2048") is not read as a YAML integer,
# which compose rejects.
name: "your-repo"

services:
  app:
    # PINQOPS_IMAGE and PINQOPS_TAG are pinned in this directory's .env by
    # `pinqops deploy` (from --image and --tag; the CI workflow passes the repo's
    # image and the commit's sha-<...> tag). The image therefore follows the
    # repository even after a rename, the exact deployed version is recorded in
    # the deploy history, and `pinqops rollback` can return to a previous one.
    # The defaults below apply only before the first deploy.
    image: ${PINQOPS_IMAGE:-ghcr.io/your-org/your-repo}:${PINQOPS_TAG:-latest}
    restart: unless-stopped

    # <host>:<container>. Publishing is what makes the app reachable — without
    # it `docker ps` shows only "80/tcp" and nothing is mapped. Set the container
    # side to whatever your Dockerfile EXPOSEs; change the host side later by
    # editing PINQOPS_HOST_PORT in this directory's .env and re-running up -d.
    ports:
      - "${PINQOPS_HOST_PORT:-8080}:${PINQOPS_CONTAINER_PORT:-80}"

    # --- Everything below is application-specific and only an illustration. ---
    # environment:
    #   - EXAMPLE=value
    #
    # OPTIONAL — join the shared pinqops-apps network so this app can reach the
    # catalog apps (Redis, PostgreSQL, …) by container DNS. Create the network
    # once: docker network create pinqops-apps
    # networks: [default, pinqops-apps]

# networks:
#   pinqops-apps:
#     external: true
