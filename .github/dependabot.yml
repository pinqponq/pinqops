version: 2
updates:
  # Keep the pinned actions in the workflows up to date — grouped into a single
  # PR so updates don't arrive one-by-one.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"

  # Keep NuGet packages up to date — grouped into a single PR.
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      dotnet:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
