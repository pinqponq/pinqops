name: CI

# Build + test the .NET solution. Runs on pushes to master (so the branch badge
# reflects master's status) and on every pull request. This workflow never
# deploys — the deploy pipeline is a template consumers copy
# (examples/workflows/deploy.yml).
on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
