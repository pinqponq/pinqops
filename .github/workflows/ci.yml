name: CI

# Validation only. This never deploys — deployment is handled exclusively by
# deploy.yml on pushes to master. CI runs on pull requests and on pushes to
# non-master branches so the .NET code is verified before it can merge.
on:
  pull_request:
  push:
    branches-ignore:
      - master

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
