name: Release

# On a version tag (e.g. v1.2.3), publish self-contained, single-file
# linux-x64 binaries — the `pinqops` CLI and the optional `pinqops-ui`
# dashboard — and attach them to the GitHub Release. Servers install them by
# downloading these assets (see docs/SETUP.md).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained linux-x64 binaries
        run: |
          dotnet publish src/PinqOps.Cli \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish
          dotnet publish src/PinqOps.Web \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            publish/pinqops
            publish/pinqops-ui
