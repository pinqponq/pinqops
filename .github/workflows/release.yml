name: Release

# On a version tag (e.g. v1.2.3), publish a self-contained, single-file
# linux-x64 `pinqops` binary and attach it to the GitHub Release. Servers install
# pinqops by downloading this asset (see docs/SETUP.md).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained linux-x64 binary
        run: |
          dotnet publish src/PinqOps.Cli \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish

      - name: Attach binary to the release
        uses: softprops/action-gh-release@v3
        with:
          files: publish/pinqops
