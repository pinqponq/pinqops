name: Release

# Every push to master cuts a release automatically: the patch version is
# bumped from the latest v* tag, self-contained linux-x64 binaries (`pinqops`
# CLI + optional `pinqops-ui` dashboard) are built with that version stamped
# in, and the release action creates the tag. Pushing a v* tag by hand or
# dispatching the workflow with an explicit version still works.
on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.5.0, without the leading v)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history + tags, to compute the next version

      - name: Determine version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            # master push: bump the patch of the newest existing v* tag.
            LATEST="$(git tag -l 'v*' --sort=-v:refname | head -1)"
            LATEST="${LATEST:-v0.0.0}"
            IFS=. read -r MA MI PA <<< "${LATEST#v}"
            VERSION="$MA.$MI.$((PA+1))"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "releasing v$VERSION"

      - name: Set up .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained linux-x64 binaries
        # Stamp the version into the binaries so `pinqops version` (and the UI
        # footer) report the release, not the SDK default 1.0.0.
        run: |
          dotnet publish src/PinqOps.Cli \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="$VERSION" \
            -o ./publish
          dotnet publish src/PinqOps.Web \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="$VERSION" \
            -o ./publish

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          files: |
            publish/pinqops
            publish/pinqops-ui
