name: Release

# On a version tag (e.g. v1.2.3), publish self-contained, single-file
# linux-x64 binaries — the `pinqops` CLI and the optional `pinqops-ui`
# dashboard — and attach them to the GitHub Release. Servers install them by
# downloading these assets (see docs/SETUP.md).
on:
  push:
    tags:
      - 'v*'
  # Manual fallback for environments where pushing tags is blocked: dispatch
  # with a version and the release action creates the tag at this commit.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.4.0, without the leading v)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained linux-x64 binaries
        # Stamp the tag into the binaries so `pinqops version` (and the UI
        # footer) report the release, not the SDK default 1.0.0.
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          if [ -z "$VERSION" ]; then VERSION="${GITHUB_REF_NAME#v}"; fi
          dotnet publish src/PinqOps.Cli \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="$VERSION" \
            -o ./publish
          dotnet publish src/PinqOps.Web \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version="$VERSION" \
            -o ./publish

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: |
            publish/pinqops
            publish/pinqops-ui
